<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>To.怡宝 | LOVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffdde1 0%, #ee9ca7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            position: relative;
            padding: 20px 0;
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .heart-particle {
            position: absolute;
            color: rgba(255, 80, 120, 0.6);
            font-size: 20px;
            animation: floatUp 8s linear infinite;
            bottom: -50px;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .card {
            position: relative;
            z-index: 10;
            max-width: 650px;
            width: 90%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
            padding: 2rem 1.8rem 2.5rem;
            text-align: center;
            animation: fadeSlideUp 1s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .beating-heart {
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23e2556d"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') no-repeat center;
            background-size: contain;
            animation: heartbeat 1.3s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.18); }
            35% { transform: scale(1.1); }
            45% { transform: scale(1.22); }
            55% { transform: scale(1.05); }
            65% { transform: scale(1.18); }
            100% { transform: scale(1); }
        }

        .greeting {
            font-family: 'Dancing Script', cursive;
            font-size: 2.4rem;
            font-weight: 700;
            color: #b13b4d;
            margin-top: 5px;
        }

        .message {
            font-size: 1.1rem;
            color: #4a2a2f;
            margin: 15px 0;
            background: rgba(255, 245, 245, 0.7);
            padding: 10px 16px;
            border-radius: 48px;
        }

        .gallery {
            margin: 20px 0;
        }

        .gallery-title {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #c4455e;
            margin-bottom: 15px;
        }

        .photo-slider {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .photo-frame {
            width: 280px;
            height: 280px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
            background: #ffe0e4;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .photo-frame img:hover {
            transform: scale(1.05);
        }

        .nav-btn {
            background: rgba(226, 85, 109, 0.8);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .nav-btn:hover {
            background: #e2556d;
            transform: scale(1.05);
        }

        .photo-caption {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #b13b4d;
            font-weight: 500;
            background: rgba(255,245,245,0.7);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #eec4cc;
            transition: 0.2s;
            cursor: pointer;
        }

        .dot.active {
            background: #e2556d;
            width: 20px;
            border-radius: 10px;
        }

        .poem {
            font-style: italic;
            font-size: 0.95rem;
            color: #aa4c61;
            background: #fff0f2;
            padding: 10px 16px;
            border-radius: 32px;
            margin: 15px 0;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #c4455e;
            margin-top: 10px;
            border-top: 1px dashed #ffb6c1;
            padding-top: 12px;
            display: inline-block;
        }

        .click-tip {
            font-size: 0.75rem;
            color: #b17c86;
            background: rgba(255,235,235,0.7);
            display: inline-block;
            padding: 5px 12px;
            border-radius: 40px;
            margin-top: 15px;
            cursor: pointer;
        }

        @media (max-width: 550px) {
            .photo-frame {
                width: 220px;
                height: 220px;
            }
            .greeting { font-size: 1.8rem; }
            .beating-heart { width: 75px; height: 75px; }
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255,215,0,0.8) 1px, transparent 1px);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: sparkleAnim 1s forwards;
            z-index: 999;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="floatingHearts"></div>
    <div class="card">
        <div class="beating-heart" id="mainHeart"></div>
        <div class="greeting">
            To My Love ❤️
        </div>
        <div class="message">
            遇见怡 是我生命里最盛大的幸运<br>
            每一天 我的心都在为怡而跳动
        </div>

        <div class="gallery">
            <div class="gallery-title">📸 我们的爱情VLOG · 定格的心动瞬间 📸</div>
            <div class="photo-slider">
                <button class="nav-btn" id="prevBtn">‹</button>
                <div class="photo-frame">
                    <img id="galleryImage" src="" alt="我们的回忆">
                </div>
                <button class="nav-btn" id="nextBtn">›</button>
            </div>
            <div class="photo-caption" id="photoCaption"></div>
            <div class="dots" id="dotsContainer"></div>
        </div>

        <div class="poem">
            “心刈一人 眼怡一生<br>
            万物皆刈 唯你是怡<br>
            以情为刈 以怡为安<br>
            一念为刈 满心为怡”
        </div>
        <div class="signature">
            —— 永远爱你的 [小刈子]
        </div>
        <div class="click-tip" id="magicBtn">
            💖 轻点爱心或照片，有惊喜 💖
        </div>
    </div>

    <script>
        // ==================== 11张照片配置区 ====================
        // ⭐ 请把下面的照片链接替换成你自己的照片！
        // 一共有11个位置，每个都有配文，你可以自由修改
        
        const photos = [
           const photos = [
    { url: "https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fsafe-img.xhscdn.com%2Fbw1%2F1c9d9f3f-3a3a-4a4a-8a8a-123456789012%3FimageView2%2F2%2Fw%2F1080%2Fformat%2Fjpg&refer=http%3A%2F%2Fsafe-img.xhscdn.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=auto", caption: "✨ 和你在一起的每一天 ✨" },
    { url: "https://picsum.photos/id/100/400/400", caption: "💕 甜甜的回忆 💕" },
    { url: "https://picsum.photos/id/101/400/400", caption: "🌹 想一直牵着你的手 🌹" },
    { url: "https://picsum.photos/id/102/400/400", caption: "💖 你是我的小幸运 💖" },
    { url: "https://picsum.photos/id/103/400/400", caption: "🌸 有你在，心安 🌸" },
    { url: "https://picsum.photos/id/104/400/400", caption: "💗 你笑起来真好看 💗" },
    { url: "https://picsum.photos/id/106/400/400", caption: "🌟 和你一起的时光 🌟" },
    { url: "https://picsum.photos/id/107/400/400", caption: "🍬 想和你黏在一起 🍬" },
    { url: "https://picsum.photos/id/108/400/400", caption: "💐 未来的路一起走 💐" },
    { url: "https://picsum.photos/id/116/400/400", caption: "🎀 爱你，不止今天 🎀" },
    { url: "https://picsum.photos/id/120/400/400", caption: "💍 余生请多指教 💍" }
        ];
        
        // 注意：上面的照片链接目前是示例图片（来自 picsum）
        // 请按照下面的“如何上传照片”教程，替换成你自己的照片链接！
        // ====================================================

        let currentIndex = 0;
        const galleryImage = document.getElementById('galleryImage');
        const photoCaption = document.getElementById('photoCaption');
        const dotsContainer = document.getElementById('dotsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function updateGallery() {
            const photo = photos[currentIndex];
            galleryImage.src = photo.url;
            photoCaption.innerText = photo.caption;
            
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                if (idx === currentIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function createDots() {
            dotsContainer.innerHTML = '';
            photos.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.classList.add('dot');
                if (idx === currentIndex) dot.classList.add('active');
                dot.addEventListener('click', () => {
                    currentIndex = idx;
                    updateGallery();
                    createSparkleEffect();
                });
                dotsContainer.appendChild(dot);
            });
        }

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + photos.length) % photos.length;
            updateGallery();
            createSparkleEffect();
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % photos.length;
            updateGallery();
            createSparkleEffect();
        });

        galleryImage.addEventListener('click', () => {
            createSparkleEffect();
            showFloatingMessage('📸 这张照片里有我们的故事 💌', '#e2556d');
        });

        function createSparkleEffect() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.classList.add('sparkle');
                    spark.style.left = Math.random() * window.innerWidth + 'px';
                    spark.style.top = Math.random() * window.innerHeight + 'px';
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 1000);
                }, i * 40);
            }
        }

        function showFloatingMessage(text, color) {
            const msgDiv = document.createElement('div');
            msgDiv.innerText = text;
            msgDiv.style.position = 'fixed';
            msgDiv.style.bottom = '30%';
            msgDiv.style.left = '50%';
            msgDiv.style.transform = 'translateX(-50%)';
            msgDiv.style.backgroundColor = 'rgba(255,240,242,0.95)';
            msgDiv.style.color = color;
            msgDiv.style.padding = '10px 20px';
            msgDiv.style.borderRadius = '50px';
            msgDiv.style.fontWeight = 'bold';
            msgDiv.style.fontFamily = "'Dancing Script', cursive";
            msgDiv.style.fontSize = '1.2rem';
            msgDiv.style.zIndex = '1000';
            msgDiv.style.whiteSpace = 'nowrap';
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 1800);
        }

        const mainHeart = document.getElementById('mainHeart');
        const magicBtn = document.getElementById('magicBtn');
        
        function enhanceHeartBeat() {
            mainHeart.style.animation = 'none';
            mainHeart.offsetHeight;
            mainHeart.style.animation = 'heartbeat 0.6s cubic-bezier(0.5, 1.5, 0.6, 1) 2';
            setTimeout(() => {
                mainHeart.style.animation = 'heartbeat 1.3s ease-in-out infinite';
            }, 700);
            createSparkleEffect();
            const messages = ["💘 你是我心跳加速的理由", "💞 爱你每一天", "🌸 宝贝，你比糖果还甜", "💖 我的心动永远为你预留"];
            showFloatingMessage(messages[Math.floor(Math.random() * messages.length)], '#c63b54');
        }
        
        mainHeart.addEventListener('click', enhanceHeartBeat);
        magicBtn.addEventListener('click', enhanceHeartBeat);
        
        function createFloatingHeart() {
            const container = document.getElementById('floatingHearts');
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            const symbols = ['❤️', '💖', '💗', '💓', '💕', '💞'];
            heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = Math.random() * 18 + 14 + 'px';
            heart.style.animationDuration = Math.random() * 5 + 5 + 's';
            container.appendChild(heart);
            heart.addEventListener('animationend', () => heart.remove());
        }
        setInterval(() => { if (document.getElementById('floatingHearts').children.length < 40) createFloatingHeart(); }, 500);
        for (let i = 0; i < 10; i++) setTimeout(() => createFloatingHeart(), i * 200);
        
        createDots();
        updateGallery();
        
        let titles = ["❤️ 541宝宝", "💕 永远爱你", "🌹 541宝宝", "💖 永远是你"];
        let idx = 0;
        setInterval(() => { document.title = titles[idx % titles.length]; idx++; }, 3000);
    </script>
</body>
</html>
