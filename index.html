<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✨ To：怡宝 ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2d1a2c 0%, #1e1a3a 50%, #2d1a2c 100%);
            font-family: -apple-system, 'Dancing Script', 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态光晕背景 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,180,200,0.15) 0%, rgba(100,80,120,0.4) 100%);
            animation: rotateGlow 20s infinite linear;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 漂浮花瓣 */
        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            font-size: 24px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 20;
            max-width: 500px;
            width: 100%;
            background: rgba(30, 20, 35, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,200,220,0.3);
            padding: 32px 24px 40px;
            text-align: center;
            border: 1px solid rgba(255,200,220,0.4);
        }

        /* 跳动爱心 */
        .heart-wrapper {
            margin: 10px 0;
        }

        .beating-heart {
            font-size: 100px;
            cursor: pointer;
            display: inline-block;
            animation: heartbeat 1.3s ease-in-out infinite;
            filter: drop-shadow(0 0 12px #ff6b8b);
            transition: 0.05s linear;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.18); }
            40% { transform: scale(1.08); }
            55% { transform: scale(1.22); }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .greeting {
            font-size: 32px;
            font-weight: 700;
            color: #ffdfe6;
            margin: 12px 0;
            text-shadow: 0 0 10px #ff3366;
            letter-spacing: 2px;
        }

        .message {
            font-size: 18px;
            color: #f5cfdf;
            background: rgba(0,0,0,0.25);
            padding: 14px 18px;
            border-radius: 50px;
            margin: 20px 0;
            line-height: 1.5;
            backdrop-filter: blur(4px);
        }

        .poem-box {
            background: rgba(255,230,240,0.12);
            border-radius: 48px;
            padding: 20px 16px;
            margin: 20px 0;
            border-left: 3px solid #ffb7c3;
            border-right: 3px solid #ffb7c3;
        }

        .poem-text {
            font-size: 16px;
            color: #ffebf0;
            line-height: 1.7;
            font-style: italic;
        }

        .signature {
            font-size: 22px;
            font-family: 'Dancing Script', cursive;
            color: #ffcad5;
            margin-top: 20px;
            border-top: 1px dashed rgba(255,180,200,0.5);
            padding-top: 18px;
        }

        .hint {
            font-size: 13px;
            color: #d9a6b8;
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            margin-top: 18px;
            backdrop-filter: blur(4px);
        }

        /* 弹出情诗 */
        .floating-poem {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            color: #ffdfe6;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 16px;
            white-space: nowrap;
            z-index: 1000;
            animation: floatUpFade 2s ease-out forwards;
            pointer-events: none;
            font-family: 'Dancing Script', cursive;
            border: 1px solid #ff99bb;
        }

        @keyframes floatUpFade {
            0% {
                bottom: 20%;
                opacity: 1;
                transform: translateX(-50%) scale(0.9);
            }
            100% {
                bottom: 70%;
                opacity: 0;
                transform: translateX(-50%) scale(1.2);
            }
        }

        /* 星星闪烁 */
        .star {
            position: fixed;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #fff9c4, #ffd966);
            border-radius: 50%;
            animation: twinkle 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes twinkle {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        @media (max-width: 550px) {
            .card { padding: 24px 18px 32px; }
            .beating-heart { font-size: 75px; }
            .greeting { font-size: 26px; }
            .message { font-size: 16px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <div class="heart-wrapper">
        <div class="beating-heart" id="mainHeart">❤️</div>
    </div>
    <div class="greeting">To My Dearest 💫</div>
    <div class="message">
        遇见你的那天，<br>
        星星都落在了你的眼睛里。
    </div>

    <div class="poem-box">
        <div class="poem-text" id="randomPoem">
            “你是我藏在心底的欢喜，<br>
            是我想用一生去守护的温柔。”
        </div>
    </div>

    <div class="signature">—— 永远爱你的 [小刈子]</div>
    <div class="hint" id="clickHint">✨ 轻点爱心，花瓣会为你落下 ✨</div>
    <div class="hint">🌙 长按屏幕，有星光降临 🌙</div>
</div>

<script>
    // 浪漫情诗库
    const lovePoems = [
        "✨ 心刈一人 眼怡一生",
        "🌸 万物皆刈 唯你是怡",
        "💖 以情为刈 以你为怡",
        "🌙 尘风尽刈 独守欢怡",
        "💫 一念为刈 满心为怡",
        "🍂 此生刈定 岁岁安怡",
        "🎀 风月皆刈 只悦你怡",
        "💗 情寄于刈 心归于怡",
        "🌟 风刈万物 唯怡入心",
        "💕 以刈为誓 以怡为终"
    ];

    // 随机更换小诗（每8秒）
    setInterval(() => {
        const poemDiv = document.getElementById('randomPoem');
        const randomIndex = Math.floor(Math.random() * lovePoems.length);
        poemDiv.innerHTML = lovePoems[randomIndex].replace(/[✨🌸💖🌙💫🍂🎀💗🌟💕]/g, '<br>$&');
    }, 8000);

    // 飘落花瓣
    function createPetal() {
        const petal = document.createElement('div');
        petal.className = 'petal';
        const petals = ['🌸', '🌹', '💮', '🌺', '🌸', '🌼', '💐', '🌸'];
        petal.innerHTML = petals[Math.floor(Math.random() * petals.length)];
        petal.style.left = Math.random() * 100 + '%';
        petal.style.fontSize = (Math.random() * 18 + 20) + 'px';
        petal.style.animationDuration = (Math.random() * 3 + 3) + 's';
        petal.style.opacity = Math.random() * 0.7 + 0.4;
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 5000);
    }

    // 星星闪烁特效 (点击位置)
    function createStar(x, y) {
        for (let i = 0; i < 8; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
            star.style.top = (y + (Math.random() - 0.5) * 80) + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 1000);
        }
    }

    // 弹出漂浮情诗
    function showFloatingPoem() {
        const poem = lovePoems[Math.floor(Math.random() * lovePoems.length)];
        const msgDiv = document.createElement('div');
        msgDiv.className = 'floating-poem';
        msgDiv.innerText = poem;
        document.body.appendChild(msgDiv);
        setTimeout(() => msgDiv.remove(), 2000);
    }

    // 爱心点击特效：花瓣雨 + 情诗 + 星光
    const heart = document.getElementById('mainHeart');
    
    function onHeartTap(e) {
        // 花瓣雨（一次10片）
        for (let i = 0; i < 12; i++) {
            setTimeout(() => createPetal(), i * 60);
        }
        // 随机情诗飘起
        showFloatingPoem();
        
        // 获取点击位置产生星光
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        if (clientX && clientY) {
            createStar(clientX, clientY);
        } else {
            // 默认在爱心周围生成星光
            const rect = heart.getBoundingClientRect();
            createStar(rect.left + rect.width/2, rect.top + rect.height/2);
        }
        
        // 爱心短暂加速跳动
        heart.style.animation = 'none';
        heart.offsetHeight;
        heart.style.animation = 'heartbeat 0.5s ease-in-out 3';
        setTimeout(() => {
            heart.style.animation = 'heartbeat 1.3s ease-in-out infinite';
        }, 600);
    }

    heart.addEventListener('click', onHeartTap);
    heart.addEventListener('touchstart', onHeartTap);

    // 长按屏幕任意位置 → 星光满天 + 情诗
    let longPressTimer;
    document.body.addEventListener('touchstart', (e) => {
        longPressTimer = setTimeout(() => {
            // 长按触发：满屏星光 + 情诗
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const randomX = Math.random() * window.innerWidth;
                    const randomY = Math.random() * window.innerHeight;
                    createStar(randomX, randomY);
                }, i * 30);
            }
            showFloatingPoem();
            showFloatingPoem();
            // 震动（如果手机支持，轻柔）
            if (navigator.vibrate) navigator.vibrate(50);
        }, 500);
    });
    document.body.addEventListener('touchend', () => {
        clearTimeout(longPressTimer);
    });
    // 鼠标长按支持（电脑测试）
    document.body.addEventListener('mousedown', () => {
        longPressTimer = setTimeout(() => {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const randomX = Math.random() * window.innerWidth;
                    const randomY = Math.random() * window.innerHeight;
                    createStar(randomX, randomY);
                }, i * 30);
            }
            showFloatingPoem();
        }, 500);
    });
    document.body.addEventListener('mouseup', () => clearTimeout(longPressTimer));

    // 摇一摇手机惊喜 (手机专属)
    let lastTime = 0;
    if (window.DeviceMotionEvent) {
        window.addEventListener('devicemotion', (e) => {
            const acc = e.accelerationIncludingGravity;
            const now = Date.now();
            if (now - lastTime > 3000) {
                const magnitude = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
                if (magnitude > 28) {  // 摇一摇阈值
                    lastTime = now;
                    // 摇一摇特效
                    for (let i = 0; i < 25; i++) {
                        setTimeout(() => createPetal(), i * 50);
                    }
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => {
                            const randomX = Math.random() * window.innerWidth;
                            const randomY = Math.random() * window.innerHeight;
                            createStar(randomX, randomY);
                        }, i * 60);
                    }
                    showFloatingPoem();
                    showFloatingPoem();
                    if (navigator.vibrate) navigator.vibrate(200);
                }
            }
        });
    }

    // 自动飘落花瓣背景 (每1.5秒一片)
    setInterval(() => {
        if (Math.random() > 0.6) createPetal();
    }, 1200);

    // 初始化一些漂浮花瓣
    for (let i = 0; i < 8; i++) {
        setTimeout(() => createPetal(), i * 300);
    }

    // 控制台浪漫彩蛋
    console.log("%c❤️ 送给最特别的你 ❤️", "color: #ff99bb; font-size: 18px; font-weight: bold;");
    console.log("%c长按屏幕有星光，摇一摇手机有惊喜", "color: #ffb7c3; font-size: 14px;");

    // 标题轮换
    let titles = ["💖 541宝宝", "🌙 61永远爱你", "💫 61满眼是你", "🌸 61心里只有你"];
    let idx = 0;
    setInterval(() => {
        document.title = titles[idx % titles.length];
        idx++;
    }, 3500);
</script>
</body>
</html>
